name: Create dist build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build and zip dist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read package name
        id: pkg
        run: |
          PKG_NAME=$(node -e "process.stdout.write(require('./package.json').name)")
          echo "name=${PKG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build with ray CLI
        run: npx ray build -e dist -o ./dist-build

      - name: Stage output folder
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"
          mkdir -p ./staging
          cp -r ./dist-build "./staging/${PKG_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: ./staging/
          retention-days: 90
