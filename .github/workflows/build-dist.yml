name: Create dist build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build and zip dist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read package name
        id: pkg
        run: |
          PKG_NAME=$(node -e "process.stdout.write(require('./package.json').name)")
          echo "name=${PKG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build with ray CLI
        run: npx ray build -e dist -o ./dist-build

      - name: Create foldered zip
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"
          mkdir -p /tmp/zip-staging
          cp -r ./dist-build "/tmp/zip-staging/${PKG_NAME}"
          cd /tmp/zip-staging
          zip -r "${PKG_NAME}.zip" "${PKG_NAME}/"
          mv "${PKG_NAME}.zip" "$GITHUB_WORKSPACE/${PKG_NAME}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: ${{ steps.pkg.outputs.name }}.zip
          retention-days: 90
